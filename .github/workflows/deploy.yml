# GitHub Actions：在 GH runner（带宽充足）构建 backend/frontend 镜像，
# push 到 ghcr.io，再 SSH 到云服务器 pull + 重启。
# 服务器仅 pull 变更 layer，不再本地 --build。
name: Build & Deploy

on:
  push:
    branches: [development]      # 仅 development 分支推送触发，其他分支不构建
  workflow_dispatch: {}          # 也支持在 Actions 页面手动触发

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/yangdi611/cwgsyw-platform-backend
  FRONTEND_IMAGE: ghcr.io/yangdi611/cwgsyw-platform-frontend
  PLATFORM: linux/amd64        # 云服务器架构（amd64）

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # 允许 push 到 ghcr
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # 自动注入，无需手动配

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.SERVER_PROJECT_DIR }}
            git pull origin development
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.prod.yml up -d --no-build backend frontend nginx
            docker image prune -f
