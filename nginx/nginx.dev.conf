events { worker_connections 1024; }
http {
  upstream backend { server backend:8080; }
  upstream frontend { server frontend:3000; }
  server {
    listen 80;
    location = /api/health { proxy_pass http://backend/actuator/health; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    # 备份/恢复：长耗时 + 大文件上传，单独放宽超时与 body 限制
    location /api/backups {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      client_max_body_size 2g;
    }
    location /api { proxy_pass http://backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /actuator { proxy_pass http://backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location / { proxy_pass http://frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
  }
}
