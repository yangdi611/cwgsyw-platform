# 平台使用手册 seed 清单
# WikiManualSeeder 启动时读取本文件，把 md 导入「平台使用手册」Wiki 空间。
# - key: 同空间内唯一标识（seed_key），决定幂等；改 key 会被当成新页
# - parent_key: 父页面的 key，省略=根页面（根页面会被设为只读 ACL）
# - file: 相对 wiki-manual/ 的 md 路径
# - sort: 同级排序
# 新增功能手册：加 md + 在此追加条目，bump 版本号 push 即可随发版自动导入。

