# Wiki seed 清单 — 多空间版
# WikiManualSeeder 启动时幂等导入所有 seed 空间。
# 新增功能：加新 md + 在对应空间 pages 追加条目，bump 版本号 push 即自动导入。
#
# write_scope:
#   none             — 仅 admin/super_admin 可改（平台使用手册）
#   super_admin_only — 仅超级管理员可改（Release Notes）
#   all              — 所有登录用户可读写（Bug 反馈）
#
# read_only: true — 单页强制只读（如 Bug 反馈里的模板页，防止被修改）

spaces:

  # ──────────────────────────────────────────
  # 1. 平台使用手册（只有 admin 可改，其余只读）
  # ──────────────────────────────────────────
  - key: platform-manual
    name: 平台使用手册
    description: IT 基础设施运维运营管理平台 - 各功能模块使用说明
    write_scope: none
    pages:
      - key: intro
        title: 平台简介与快速上手
        file: 00-intro.md
        sort: 0

      - key: dashboard
        title: 工作台
        file: 10-dashboard.md
        sort: 10

      - key: cmdb
        title: CMDB 配置管理
        file: 20-cmdb/index.md
        sort: 20
      - key: cmdb-instances
        title: CI 实例管理
        file: 20-cmdb/instances.md
        parent_key: cmdb
        sort: 1
      - key: cmdb-topology
        title: 关联与拓扑视图
        file: 20-cmdb/topology.md
        parent_key: cmdb
        sort: 2
      - key: cmdb-changes
        title: 变更历史与统计
        file: 20-cmdb/changes.md
        parent_key: cmdb
        sort: 3
      - key: cmdb-alerts
        title: 告警中心
        file: 20-cmdb/alerts.md
        parent_key: cmdb
        sort: 4
      - key: cmdb-ipam
        title: IP 地址池管理
        file: 20-cmdb/ipam.md
        parent_key: cmdb
        sort: 5

      - key: devices
        title: 设备密码库
        file: 30-devices.md
        sort: 30

      - key: daily-report
        title: 日报系统
        file: 40-daily-report.md
        sort: 40

      - key: change-doc
        title: 变更文档
        file: 50-change-doc.md
        sort: 50

      - key: shared-files
        title: 共享文件库
        file: 60-shared-files.md
        sort: 60

      - key: wiki
        title: Wiki 知识库使用说明
        file: 70-wiki.md
        sort: 70

      - key: admin
        title: 系统管理
        file: 80-admin/index.md
        sort: 80
      - key: admin-rbac
        title: 用户与权限管理
        file: 80-admin/rbac.md
        parent_key: admin
        sort: 1
      - key: admin-config-backup
        title: 系统配置与备份
        file: 80-admin/config-backup.md
        parent_key: admin
        sort: 2

  # ──────────────────────────────────────────
  # 2. Release Notes（仅超级管理员可写，其余只读）
  # ──────────────────────────────────────────
  - key: release-notes
    name: Release Notes
    description: 平台每次版本发布的功能更新说明
    write_scope: super_admin_only
    pages:
      - key: rn-v0-14-0
        title: v0.14.0 — 2026年6月26日
        file: release-notes/v0.14.0.md
        sort: 1000
      - key: rn-v0-15-0
        title: v0.15.0 — 2026年6月26日
        file: release-notes/v0.15.0.md
        sort: 999
      - key: rn-v0-16-0
        title: v0.16.0 — 2026年6月26日
        file: release-notes/v0.16.0.md
        sort: 998
      - key: rn-v0-17-0
        title: v0.17.0 — 2026年6月27日
        file: release-notes/v0.17.0.md
        sort: 997
      - key: rn-v0-18-0
        title: v0.18.0 — 2026年6月27日
        file: release-notes/v0.18.0.md
        sort: 996
      - key: rn-v0-19-0
        title: v0.19.0 — 2026年6月28日
        file: release-notes/v0.19.0.md
