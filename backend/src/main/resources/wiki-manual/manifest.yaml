  # ──────────────────────────────────────────
  # 3. Bug 反馈（所有人可读写，模板页只读）
  # ──────────────────────────────────────────
  - key: bug-feedback
    name: Bug 反馈与建议
    description: 提交 Bug 报告、优化建议、新功能需求，团队共同完善平台
    write_scope: all
    pages:
      - key: bf-readme
        title: 如何提交反馈
        file: bug-feedback/readme.md
        sort: 0
      - key: bf-template-bug
        title: 【模板】Bug 报告
        file: bug-feedback/template-bug.md
        sort: 10
        read_only: true
      - key: bf-template-improve
        title: 【模板】优化建议
        file: bug-feedback/template-improve.md
        sort: 20
        read_only: true
      - key: bf-template-feature
        title: 【模板】新功能需求
        file: bug-feedback/template-feature.md
        sort: 30
        read_only: true
